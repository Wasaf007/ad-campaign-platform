spring.application.name=ad-campaign-platform

# PostgreSQL Database Config
spring.datasource.url=jdbc:postgresql://localhost:5432/adcampaign
spring.datasource.username=basis
spring.datasource.password=basis123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Config
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=basis
spring.rabbitmq.password=basis123

# Server Port
server.port=8080